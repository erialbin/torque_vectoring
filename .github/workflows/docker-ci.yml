name: Docker CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
  push:
    branches:
      - main
      - build
    paths-ignore:
      - 'docs/**'
      - 'README.md'

jobs:
  check_files:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check for Dockerfile
      run: |
        if [ ! -f Dockerfile ]; then
          echo "Dockerfile not found!"
          exit 1
        fi

    - name: Check for docker-compose file
      run: |
        if [ ! -f docker-compose.yml ]; then
          echo "docker-compose.yml not found!"
          exit 1
        fi

    - name: Check for docker-entrypoint.sh file
      run: |
        if [ ! -f docker-entrypoint.sh ]; then
          echo "docker-entrypoint.sh not found!"
          exit 1
        fi

  docker_operations:
    needs: check_files
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: false
        token: ${{ secrets.PAT }}

    - name: Configure Git for Private Submodules
      run: |
        # Configure Git credentials using PAT
        git config --global url."https://x-access-token:${PAT}@github.com/".insteadOf "git@github.com:"

        # Verify .gitmodules content before any changes
        echo "Original .gitmodules content:"
        cat .gitmodules

        # Update submodules with the configured credentials
        git submodule update --init --recursive
      env:
        PAT: ${{ secrets.PAT }}

    - name: Check Files
      run: |
        find . -maxdepth 2
        echo "Submodule initialization complete"

    - name: Docker Compose Action
      uses: isbang/compose-action@v2.0.1

    - name: Container Health Check
      env:
        COMPOSE_UP_TIMEOUT_SECONDS: 120
      run: |
        for ((i = 0; i <= $COMPOSE_UP_TIMEOUT_SECONDS; i += 2)); do
          if [[ $(docker ps --format "{{.Names}}") == *$(basename "$(pwd)")* ]]; then
            echo "Container found after $i seconds!"
            echo "Output from docker ps: $(docker ps)"
            echo "Output from docker ps --format: $(docker ps --format "{{.Names}}")"
            break
          fi

          if [[ $i -ge $COMPOSE_UP_TIMEOUT_SECONDS ]]; then
            echo "TIMEOUT: Container not found!"
            echo "Output from docker ps: $(docker ps)"
            echo "Output from docker ps --format: $(docker ps --format "{{.Names}}")"
            exit 1
          fi
          sleep 2
        done

    - name: Build Health Check
      env:
        COLCON_BUILD_TIMEOUT_SECONDS: 1200
      run: |
        set -x
        sleep 5
        for ((i = 5; i <= $COLCON_BUILD_TIMEOUT_SECONDS; i += 10)); do

          container_initialized=false
          # Loop through the running container names
          echo "Docker Values : $(docker ps --format '{{.Names}}')"
          for container in $(docker ps --format "{{.Names}}"); do

            if [[ $container == *$(basename "$(pwd)")* ]]; then
              # Check if the file exists in the matched container
              if docker exec $container test -f /ws/.CONTAINER_INITIALIZED_PLACEHOLDER; then
                container_initialized=true
                break
              fi
            fi
          done
          docker logs "$(docker ps --format '{{.Names}}' | grep "$(basename "$(pwd)")")"

          if [[ $container_initialized == true ]]; then
            echo "Build sentinel file found after $i seconds!"
            echo "Output from find: $(docker exec "$(docker ps --format "{{.Names}}" | grep "$(basename "$(pwd)")")" bash -c "find / -name .CONTAINER_INITIALIZED_PLACEHOLDER")"
            break
          fi

          if [[ $i -ge $COLCON_BUILD_TIMEOUT_SECONDS ]]; then
            echo "TIMEOUT: Build sentinel file not found!"
            echo "Output from find: $(docker exec "$(docker ps --format "{{.Names}}" | grep "$(basename "$(pwd)")")" bash -c "find / -name .CONTAINER_INITIALIZED_PLACEHOLDER")"
            echo "Output from ls: $(docker exec "$(docker ps --format "{{.Names}}" | grep "$(basename "$(pwd)")")" bash -c "ls")"

            exit 1
          fi
          sleep 10
        done

    - name: ROS2 Node Health Check
      run: |
        # Get the container name
        CONTAINER_NAME=$(docker ps --format "{{.Names}}" | grep "$(basename "$(pwd)")")
        
        # Wait a moment for nodes to start
        sleep 5
        
        # Check if ROS2 nodes are running
        if ! docker exec $CONTAINER_NAME bash -c "source /ws/install/setup.bash && ros2 node list" | grep -E "time_publisher|time_subscriber"; then
          echo "Health check failed!"
          echo "Expected nodes not found. Current nodes:"
          docker exec $CONTAINER_NAME bash -c "source /ws/install/setup.bash && ros2 node list"
          exit 1
        fi
        
        echo "ROS2 nodes are running correctly!"
